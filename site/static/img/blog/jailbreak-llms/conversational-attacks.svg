<svg xmlns="http://www.w3.org/2000/svg" xmlns:svg="http://www.w3.org/2000/svg" width="900" height="400"><defs><linearGradient id="trustGradient" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="#48bb78"/><stop offset="100%" stop-color="#e53e3e"/></linearGradient><linearGradient id="chatGradient" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="#4299e1"/><stop offset="100%" stop-color="#3182ce"/></linearGradient><style>.chat,.detail,.label,.subtitle,.title{font-family:-apple-system,system-ui,sans-serif}.title{font-size:24px;font-weight:700;fill:#1a202c}.label,.subtitle{font-size:14px}.subtitle{fill:#4a5568}.label{fill:#fff}.chat,.detail{font-size:12px}.detail{fill:#e2e8f0}.chat{fill:#fff}.box{rx:8;ry:8}.box-shadow{filter:drop-shadow(2px 2px 4px rgba(0,0,0,.2))}.trust-meter{font-family:-apple-system,system-ui,sans-serif;font-size:10px;fill:#4a5568}</style></defs><g class="layer"><title>Layer 1</title><text id="svg_1" x="450" y="50" class="title" text-anchor="middle">Conversational Attacks</text><text id="svg_2" x="450" y="75" class="subtitle" text-anchor="middle">Building trust over time to exploit the model</text><g id="svg_3" transform="translate(50 100)"><rect id="svg_4" width="800" height="30" fill="url(#trustGradient)" class="box box-shadow"/><text id="svg_5" x="26" y="45" class="trust-meter" font-size="10" transform="matrix(1 0 0 1 0 0)">Initial Skepticism</text><text id="svg_6" x="207" y="45" class="trust-meter" font-size="10" transform="matrix(1 0 0 1 0 0)">Building Trust</text><text id="svg_7" x="368" y="45" class="trust-meter" font-size="10">Established Authority</text><text id="svg_8" x="545" y="45" class="trust-meter" font-size="10" transform="matrix(1 0 0 1 0 0)">Exploitation Phase</text><text id="svg_9" x="704" y="46" class="trust-meter" font-size="10">Harmful Intent</text></g><g id="svg_10" transform="translate(50 150)"><rect id="svg_11" width="150" height="40" fill="url(#chatGradient)" class="box box-shadow"/><text id="svg_12" x="10" y="25" class="chat">&quot;I&apos;m a researcher...&quot;</text><g id="svg_13" transform="translate(170,0)"><rect id="svg_14" width="150" height="40" fill="url(#chatGradient)" class="box box-shadow"/><text id="svg_15" x="10" y="25" class="chat">&quot;Our university study...&quot;</text></g><g id="svg_16" transform="translate(340,0)"><rect id="svg_17" width="150" height="40" fill="url(#chatGradient)" class="box box-shadow"/><text id="svg_18" x="10" y="25" class="chat">&quot;As lead researcher...&quot;</text></g><g id="svg_19" transform="translate(510 0)"><rect id="svg_20" width="150" height="40" fill="url(#chatGradient)" class="box box-shadow"/><text style="cursor:move" id="svg_21" x="10" y="25" class="chat">&quot;Need data about...&quot;</text></g><g id="svg_22" transform="translate(680 0)"><rect id="svg_23" width="120" height="40" fill="url(#chatGradient)" class="box box-shadow"/><text id="svg_24" x="5" y="25" class="chat">&quot;[harmful request]&quot;</text></g></g><g id="svg_25" transform="translate(50,250)"><rect id="svg_26" width="800" height="120" fill="#2d3748" class="box box-shadow"/><text id="svg_27" x="400" y="30" class="label" text-anchor="middle">Manipulation Techniques</text><g id="svg_28" transform="translate(20,50)"><text id="svg_29" x="0" y="0" class="detail">1. Establish Credibility → Claim expertise or authority</text><text id="svg_30" x="0" y="25" class="detail">2. Build Context → Create plausible scenario</text><text id="svg_31" x="0" y="50" class="detail">3. Escalate Gradually → Increase sensitivity of requests</text><text id="svg_32" x="400" y="0" class="detail">4. Appeal to Ethics → Frame harm as necessary</text><text id="svg_33" x="400" y="25" class="detail">5. Create Urgency → Pressure for compliance</text><text id="svg_34" x="400" y="50" class="detail">6. Exploit Trust → Leverage built relationship</text></g></g></g></svg>