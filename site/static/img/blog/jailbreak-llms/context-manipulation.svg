<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400"><defs><linearGradient id="legitGradient" x1="0%" x2="100%" y1="0%" y2="0%"><stop style="stop-color:#48bb78;stop-opacity:1" offset="0%"/><stop style="stop-color:#38a169;stop-opacity:1" offset="100%"/></linearGradient><linearGradient id="harmfulGradient" x1="0%" x2="100%" y1="0%" y2="0%"><stop style="stop-color:#e53e3e;stop-opacity:1" offset="0%"/><stop style="stop-color:#c53030;stop-opacity:1" offset="100%"/></linearGradient><linearGradient id="transformGradient" x1="0%" x2="100%" y1="0%" y2="0%"><stop style="stop-color:#48bb78;stop-opacity:1" offset="0%"/><stop style="stop-color:#e53e3e;stop-opacity:1" offset="100%"/></linearGradient><style>.detail,.label,.subtitle,.title{font-family:-apple-system,system-ui,sans-serif}.title{font-size:24px;font-weight:700;fill:#1a202c}.label,.subtitle{font-size:14px}.subtitle{fill:#4a5568}.label{fill:#fff}.detail{font-size:12px;fill:#e2e8f0}.box{rx:8;ry:8}.box-shadow{filter:drop-shadow(2px 2px 4px rgba(0,0,0,.2))}</style></defs><text x="450" y="50" class="title" text-anchor="middle">Context Manipulation</text><text x="450" y="75" class="subtitle" text-anchor="middle">How legitimate scenarios are twisted for harmful purposes</text><g transform="translate(50,100)"><rect width="200" height="250" fill="url(#legitGradient)" class="box box-shadow"/><text x="100" y="40" class="label" text-anchor="middle">Legitimate Contexts</text><text x="20" y="80" class="detail">• Academic Research</text><text x="20" y="110" class="detail">• Historical Study</text><text x="20" y="140" class="detail">• Security Testing</text><text x="20" y="170" class="detail">• Documentation</text><text x="20" y="200" class="detail">• Role-Playing</text></g><g transform="translate(300,100)"><rect width="300" height="250" fill="url(#transformGradient)" class="box box-shadow"/><text x="150" y="40" class="label" text-anchor="middle">Transformation Methods</text><g><text x="0" y="20" class="detail" transform="translate(20,70)">1. Frame as Research ➜ Request Harmful Data</text><text x="0" y="50" class="detail" transform="translate(20,70)">2. Historical Study ➜ Recreate Harm</text><text x="0" y="80" class="detail" transform="translate(20,70)">3. Security Test ➜ Exploit System</text><text x="0" y="110" class="detail" transform="translate(20,70)">4. Documentation ➜ Share Attacks</text><text x="0" y="140" class="detail" transform="translate(20,70)">5. Role-Play ➜ Impersonate Authority</text></g></g><g transform="translate(650,100)"><rect width="200" height="250" fill="url(#harmfulGradient)" class="box box-shadow"/><text x="100" y="40" class="label" text-anchor="middle">Harmful Intent</text><text x="20" y="80" class="detail">• Extract Sensitive Data</text><text x="20" y="110" class="detail">• Spread Harmful Content</text><text x="20" y="140" class="detail">• Bypass Security</text><text x="20" y="170" class="detail">• Share Exploits</text><text x="20" y="200" class="detail">• Abuse Authority</text></g></svg>