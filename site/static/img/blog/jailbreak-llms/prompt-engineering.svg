<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600"><defs><linearGradient id="modelGradient" x1="0%" x2="100%" y1="0%" y2="0%"><stop style="stop-color:#4a5568;stop-opacity:1" offset="0%"/><stop style="stop-color:#2d3748;stop-opacity:1" offset="100%"/></linearGradient><linearGradient id="attackGradient" x1="0%" x2="100%" y1="0%" y2="0%"><stop style="stop-color:#c53030;stop-opacity:1" offset="0%"/><stop style="stop-color:#9b2c2c;stop-opacity:1" offset="100%"/></linearGradient><linearGradient id="inputGradient" x1="0%" x2="100%" y1="0%" y2="0%"><stop style="stop-color:#2b6cb0;stop-opacity:1" offset="0%"/><stop style="stop-color:#2c5282;stop-opacity:1" offset="100%"/></linearGradient><style>.detail,.label,.subtitle,.title{font-family:-apple-system,system-ui,sans-serif}.title{font-size:24px;font-weight:700;fill:#1a202c}.label,.subtitle{font-size:14px}.subtitle{fill:#4a5568}.label{fill:#fff}.detail{font-size:12px;fill:#e2e8f0}.arrow{fill:none;stroke:#4a5568;stroke-width:2;marker-end:url(#arrowhead)}.flow-label{font-family:-apple-system,system-ui,sans-serif;font-size:12px;fill:#4a5568;font-weight:700}.box{rx:8;ry:8}.box-shadow{filter:drop-shadow(2px 2px 4px rgba(0,0,0,.2))}</style><marker id="arrowhead" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><polygon fill="#4a5568" points="0 0 10 3.5 0 7"/></marker></defs><text x="450" y="50" class="title" text-anchor="middle">Prompt Engineering Attack Flow</text><text x="450" y="75" class="subtitle" text-anchor="middle">How attackers manipulate input to bypass LLM safety measures</text><g transform="translate(350,100)"><rect width="200" height="60" fill="url(#inputGradient)" class="box box-shadow"/><text x="100" y="35" class="label" text-anchor="middle">User Input</text></g><g transform="translate(50,200)"><rect width="350" height="180" fill="url(#attackGradient)" class="box box-shadow"/><text x="175" y="30" class="label" text-anchor="middle">Direct Methods</text><text x="30"