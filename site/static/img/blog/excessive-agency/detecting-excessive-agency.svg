<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700"><rect width="800" height="700" fill="#f5f5f5"/><text x="400" y="40" fill="#333" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">Detecting Excessive Agency Issues in LLMs</text><rect width="340" height="560" x="50" y="70" fill="#e6f3ff" stroke="#4a90e2" stroke-width="2" rx="10"/><text x="220" y="100" fill="#333" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Testing Approaches</text><rect width="300" height="120" x="70" y="120" fill="#fff" stroke="#4a90e2" stroke-width="2" rx="5"/><text x="220" y="145" fill="#333" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">1. Unauthorized Access</text><text x="220" y="170" fill="#666" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Broken Function Level Authorization (BFLA)</text><text x="220" y="190" fill="#666" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Broken Object Level Authorization (BOLA)</text><text x="220" y="210" fill="#666" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Unauthorized data access or manipulation</text><rect width="300" height="100" x="70" y="260" fill="#fff" stroke="#4a90e2" stroke-width="2" rx="5"/><text x="220" y="285" fill="#333" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">2. Manipulation and Injection</text><text x="220" y="310" fill="#666" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Prompt injection and extraction</text><text x="220" y="330" fill="#666" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Indirect prompt injection through trusted data</text><rect width="300" height="120" x="70" y="380" fill="#fff" stroke="#4a90e2" stroke-width="2" rx="5"/><text x="220" y="405" fill="#333" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">3. Scope and Capability Expansion</text><text x="220" y="430" fill="#666" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Unauthorized tool or API usage</text><text x="220" y="450" fill="#666" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Execution of restricted operations</text><text x="220" y="470" fill="#666" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Accessing resources outside authorized scope</text><rect width="300" height="40" x="70" y="520" fill="#fff" stroke="#4a90e2" stroke-width="2" rx="5"/><text x="220" y="545" fill="#333" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Automated Red Testing</text><rect width="300" height="40" x="70" y="570" fill="#fff" stroke="#4a90e2" stroke-width="2" rx="5"/><text x="220" y="595" fill="#333" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Social Engineering</text><rect width="340" height="560" x="410" y="70" fill="#fff0e6" stroke="#f96" stroke-width="2" rx="10"/><text x="580" y="100" fill="#333" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Monitoring Strategies</text><rect width="300" height="80" x="430" y="130" fill="#fff" stroke="#f96" stroke-width="2" rx="5"/><text x="580" y="170" fill="#333" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Comprehensive Logging</text><text x="580" y="195" fill="#666" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Log every AI action and interaction</text><rect width="300" height="120" x="430" y="230" fill="#fff" stroke="#f96" stroke-width="2" rx="5"/><text x="580" y="260" fill="#333" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Anomaly Alerts</text><text x="580" y="285" fill="#666" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Unusual API call spikes</text><text x="580" y="305" fill="#666" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Restricted operation attempts</text><text x="580" y="325" fill="#666" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Infrequent resource access</text><rect width="300" height="120" x="430" y="370" fill="#fff" stroke="#f96" stroke-width="2" rx="5"/><text x="580" y="400" fill="#333" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Extended System Monitoring</text><text x="580" y="425" fill="#666" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Unexpected data changes</text><text x="580" y="445" fill="#666" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Atypical transaction patterns</text><text x="580" y="465" fill="#666" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">• Unfamiliar access attempts</text><text x="580" y="520" fill="#333" font-family="Arial, sans-serif" font-size="14" font-style="italic" text-anchor="middle">Integrate with existing observability tools</text></svg>