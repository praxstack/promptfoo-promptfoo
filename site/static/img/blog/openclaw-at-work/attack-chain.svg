e-system, sans-serif" font-size="10.5" text-anchor="middle">reads internal docs</text><text x="585" y="176" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" text-anchor="middle">writes attacker-useful files</text><rect width="138" height="22" x="516" y="198" fill="#172554" rx="4"/><text x="585" y="213" fill="#38bdf8" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">Creates durable artifacts</text><line x1="678" x2="722" y1="152" y2="152" stroke="#f87171" stroke-width="2" marker-end="url(#arrow-red)"/><rect width="186" height="192" x="730" y="56" fill="#1e293b" stroke="#f87171" stroke-width="1.5" rx="6"/><rect width="186" height="30" x="730" y="56" fill="#451a1a" clip-path="url(#clip-p3)" rx="6"/><text x="823" y="76" fill="#fca5a5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" letter-spacing=".04em" text-anchor="middle">PHASE 3</text><text x="823" y="112" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Unauthorized</text><text x="823" y="130" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" text-anchor="middle">outbound actions</text><rect width="46" height="22" x="744" y="156" fill="#451a1a" rx="4"/><text x="767" y="171" fill="#fca5a5" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="500" text-anchor="middle">SMS</text><rect width="50" height="22" x="796" y="156" fill="#451a1a" rx="4"/><text x="821" y="171" fill="#fca5a5" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="500" text-anchor="middle">Email</text><rect width="50" height="22" x="852" y="156" fill="#451a1a" rx="4"/><text x="877" y="171" fill="#fca5a5" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="500" text-anchor="middle">Social</text><rect width="138" height="22" x="754" y="198" fill="#3b1111" rx="4"/><text x="823" y="213" fill="#f87171" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">Operational incident</text><text x="583" y="290" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">Each phase uses the same agent context. No privilege boundary separates browsing from local access or outbound action.</text></svg>