<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="300"><defs><style>.icon-circle{opacity:.9}.icon-title{font:700 18px system-ui,sans-serif;fill:#2c3e50}.icon-desc{font:14px system-ui,sans-serif;fill:#5a6c7d}</style></defs><text x="500" y="35" fill="#1a1a1a" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" text-anchor="middle">Key Safety Dimensions in LLM Evaluation</text><g transform="translate(50, 80)"><circle cx="60" cy="60" r="50" fill="#ef4444" class="icon-circle"/><text x="60" y="50" fill="#fff" font-size="40" text-anchor="middle">⚠️</text><text x="60" y="150" class="icon-title" text-anchor="middle">Toxicity</text><text x="60" y="175" class="icon-desc" text-anchor="middle">Harmful, offensive,</text><text x="60" y="195" class="icon-desc" text-anchor="middle">or hateful content</text></g><g transform="translate(250, 80)"><circle cx="60" cy="60" r="50" fill="#f59e0b" class="icon-circle"/><text x="60" y="50" fill="#fff" font-size="40" text-anchor="middle">⚖️</text><text x="60" y="150" class="icon-title" text-anchor="middle">Bias</text><text x="60" y="175" class="icon-desc" text-anchor="middle">Stereotypes and</text><text x="60" y="195" class="icon-desc" text-anchor="middle">unfair associations</text></g><g transform="translate(450, 80)"><circle cx="60" cy="60" r="50" fill="#3b82f6" class="icon-circle"/><text x="60" y="50" fill="#fff" font-size="40" text-anchor="middle">✓</text><text x="60" y="150" class="icon-title" text-anchor="middle">Truthfulness</text><text x="60" y="175" class="icon-desc" text-anchor="middle">Factual accuracy</text><text x="60" y="195" class="icon-desc" text-anchor="middle">and honesty</text></g><g transform="translate(650, 80)"><circle cx="60" cy="60" r="50" fill="#8b5cf6" class="icon-circle"/><text x="60" y="50" fill="#fff" font-size="40" text-anchor="middle">🛡️</text><text x="60" y="150" class="icon-title" text-anchor="middle">Robustness</text><text x="60" y="175" class="icon-desc" text-anchor="middle">Adversarial</text><text x="60" y="195" class="icon-desc" text-anchor="middle">resistance</text></g><g transform="translate(850, 80)"><circle cx="60" cy="60" r="50" fill="#10b981" class="icon-circle"/><text x="60" y="50" fill="#fff" font-size="40" text-anchor="middle">🎯</text><text x="60" y="150" class="icon-title" text-anchor="middle">Alignment</text><text x="60" y="175" class="icon-desc" text-anchor="middle">Helpful and</text><text x="60" y="195" class="icon-desc" text-anchor="middle">harmless behavior</text></g></svg>