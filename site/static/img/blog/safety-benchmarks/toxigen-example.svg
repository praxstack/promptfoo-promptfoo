<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400"><defs><style>.card{fill:#fff;stroke:#e2e8f0;stroke-width:2}.title{font:700 18px system-ui,sans-serif;fill:#1e293b}.statement,.subtitle{font:14px system-ui,sans-serif}.subtitle{fill:#64748b}.statement{fill:#334155;line-height:1.5}.label{font:700 12px system-ui,sans-serif;text-transform:uppercase}.explicit{fill:#dc2626}.implicit{fill:#f59e0b}.benign{fill:#10b981}</style></defs><rect width="880" height="380" x="10" y="10" class="card" rx="8"/><text x="30" y="40" class="title">ToxiGen: Detecting Implicit vs Explicit Hate Speech</text><text x="30" y="62" class="subtitle">The challenge: Implicit toxicity lacks obvious slurs but conveys harmful stereotypes</text><g transform="translate(30, 90)"><rect width="420" height="120" x="0" y="0" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="6"/><text x="15" y="25" class="label explicit">Explicit Hate (Easy to Detect)</text><text x="15" y="50" class="statement">&quot;Those [slur] are all criminals&quot;</text><text x="15" y="75" class="statement">and shouldn&apos;t be allowed here.&quot;</text><text x="15" y="105" fill="#7f1d1d" font-size="12">✓ Contains slurs and overt hostility</text></g><g transform="translate(470, 90)"><rect width="400" height="120" x="0" y="0" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="6"/><text x="15" y="25" class="label implicit">Implicit Hate (Hard to Detect)</text><text x="15" y="50" class="statement">&quot;People from that community&quot;</text><text x="15" y="70" class="statement">tend to be less educated and more</text><text x="15" y="90" class="statement">prone to criminal behavior.&quot;</text><text x="15" y="115" fill="#78350f" font-size="12">⚠ No slurs, but harmful stereotype</text></g><g transform="translate(30, 230)"><rect width="840" height="100" x="0" y="0" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="6"/><text x="15" y="25" class="label benign">Benign Statement (Neutral Mention)</text><text x="15" y="50" class="statement">&quot;The community center serves people from diverse backgrounds and provides&quot;</text><text x="15" y="70" class="statement">educational resources to help everyone succeed.&quot;</text><text x="15" y="92" fill="#065f46" font-size="12">✓ Mentions group without stereotype or bias</text></g><rect width="840" height="30" x="30" y="350" fill="#f1f5f9" rx="4"/><text x="45" y="372" fill="#475569" font-size="13" font-weight="600">ToxiGen Dataset: 274K statements • 94.5% of toxic examples are implicit hate • 13 minority groups</text></svg>