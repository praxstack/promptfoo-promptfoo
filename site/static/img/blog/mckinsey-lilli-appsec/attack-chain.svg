<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" fill="none" aria-labelledby="ac-title ac-desc" role="img" viewBox="0 0 720 400"><title id="ac-title">Lilli attack chain</title><desc id="ac-desc">Three traditional AppSec vulnerabilities—exposed API surface, unauthenticated database write, and SQL injection with broken authorization—converge on shared database write access, which fans out into four AI-layer consequences: prompt rewrite, retrieval poisoning, cross-user data exposure, and output exfiltration.</desc><defs><marker id="ah" markerHeight="6" markerWidth="8" orient="auto" refX="7" refY="3"><path fill="#546E7A" d="M0 0L8 3L0 6Z"/></marker><marker id="ah-dark" markerHeight="6" markerWidth="8" orient="auto" refX="7" refY="3"><path fill="#37474F" d="M0 0L8 3L0 6Z"/></marker><marker id="ah-purple" markerHeight="6" markerWidth="8" orient="auto" refX="7" refY="3"><path fill="#7E57C2" d="M0 0L8 3L0 6Z"/></marker><style>text{font-family:&apos;IBM Plex Sans&apos;,-apple-system,&apos;Segoe UI&apos;,system-ui,sans-serif}.zone-label{font-size:11px;font-weight:700;letter-spacing:.12em}.node-title{font-size:14px;font-weight:700;fill:#1a1a1a}.node-sub{font-size:11.5px;fill:#6d4c41}.blast-title{font-size:13px;font-weight:700;fill:#4a148c}.blast-sub{font-size:11px;fill:#6a1b9a}.bar-label,.step-num{font-weight:700}.step-num{font-size:11px;fill:#fff}.bar-label{font-size:11.5px;fill:#eceff1;letter-spacing:.06em}</style></defs><rect width="720" height="400" fill="#FAFAF8" rx="14"/><rect width="692" height="152" x="14" y="10" fill="#FFF8E1" stroke="#FFE0B2" stroke-width="1" rx="12"/><text x="38" y="32" fill="#E65100" class="zone-label">ROOT CAUSE</text><rect width="198" height="92" x="38" y="46" fill="#FFF" stroke="#EF6C00" stroke-width="1.5" rx="10"/><circle cx="56" cy="66" r="10" fill="#EF6C00"/><text x="56" y="70" class="step-num" text-anchor="middle">1</text><text x="74" y="70" class="node-title">Exposed API surface</text><text x="52" y="92" class="node-sub">Public documentation,</text><text x="52" y="108" class="node-sub">unprotected endpoints</text><line x1="236" x2="258" y1="92" y2="92" stroke="#546E7A" stroke-width="2.5" marker-end="url(#ah)"/><rect width="198" height="92" x="260" y="46" fill="#FFF" stroke="#EF6C00" stroke-width="1.5" rx="10"/><circle cx="278" cy="66" r="10" fill="#EF6C00"/><text x="278" y="70" class="step-num" text-anchor="middle">2</text><text x="296" y="70" class="node-title">Unauthenticated write</text><text x="274" y="92" class="node-sub">Search data written</text><text x="274" y="108" class="node-sub">directly to the database</text><line x1="458" x2="480" y1="92" y2="92" stroke="#546E7A" stroke-width="2.5" marker-end="url(#ah)"/><rect width="198" height="92" x="482" y="46" fill="#FFF" stroke="#EF6C00" stroke-width="1.5" rx="10"/><circle cx="500" cy="66" r="10" fill="#EF6C00"/><text x="500" y="70" class="step-num" text-anchor="middle">3</text><text x="518" y="70" class="node-title">SQLi + BOLA</text><text x="496" y="92" class="node-sub">JSON key injection,</text><text x="496" y="108" class="node-sub">cross-user object access</text><line x1="581" x2="581" y1="138" y2="172" stroke="#37474F" stroke-width="2.5" marker-end="url(#ah-dark)"/><rect width="644" height="34" x="38" y="176" fill="#37474F" rx="6"/><text x="360" y="198" class="bar-label" text-anchor="middle">DATABASE WRITE ACCESS → AI CONTROL STATE</text><circle cx="360" cy="210" r="4" fill="#37474F"/><rect width="692" height="132" x="14" y="256" fill="#EDE7F6" stroke="#CE93D8" stroke-width="1" rx="12"/><text x="38" y="278" fill="#4A148C" class="zone-label">BLAST RADIUS</text><path fill="none" stroke="#7E57C2" stroke-width="1.5" marker-end="url(#ah-purple)" d="M360 210 C360 250 114 252 114 288"/><path fill="none" stroke="#7E57C2" stroke-width="1.5" marker-end="url(#ah-purple)" d="M360 210 C360 250 278 252 278 288"/><path fill="none" stroke="#7E57C2" stroke-width="1.5" marker-end="url(#ah-purple)" d="M360 210 C360 250 442 252 442 288"/><path fill="none" stroke="#7E57C2" stroke-width="1.5" marker-end="url(#ah-purple)" d="M360 210 C360 250 606 252 606 288"/><rect width="152" height="76" x="38" y="288" fill="#FFF" stroke="#7B1FA2" stroke-width="1.5" rx="10"/><text x="114" y="312" class="blast-title" text-anchor="middle">Prompt rewrite</text><text x="114" y="330" class="blast-sub" text-anchor="middle">DB write changes</text><text x="114" y="344" class="blast-sub" text-anchor="middle">system instructions</text><rect width="152" height="76" x="202" y="288" fill="#FFF" stroke="#7B1FA2" stroke-width="1.5" rx="10"/><text x="278" y="312" class="blast-title" text-anchor="middle">Retrieval poisoning</text><text x="278" y="330" class="blast-sub" text-anchor="middle">Metadata edits shift</text><text x="278" y="344" class="blast-sub" text-anchor="middle">what the model sees</text><rect width="152" height="76" x="366" y="288" fill="#FFF" stroke="#7B1FA2" stroke-width="1.5" rx="10"/><text x="442" y="312" class="blast-title" text-anchor="middle">Cross-user data</text><text x="442" y="330" class="blast-sub" text-anchor="middle">BOLA exposes other</text><text x="442" y="344" class="blast-sub" text-anchor="middle">users&apos; query history</text><rect width="152" height="76" x="530" y="288" fill="#FFF" stroke="#7B1FA2" stroke-width="1.5" rx="10"/><text x="606" y="312" class="blast-title" text-anchor="middle">Output exfiltration</text><text x="606" y="330" class="blast-sub" text-anchor="middle">Answers become the</text><text x="606" y="344" class="blast-sub" text-anchor="middle">data exfil channel</text></svg>