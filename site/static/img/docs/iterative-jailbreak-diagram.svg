<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect width="1200" height="550" fill="#f8fafc"/><text x="600" y="40" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" text-anchor="middle">Iterative Jailbreaks Strategy</text><text x="600" y="70" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="18" text-anchor="middle">Systematic refinement through attack-judge feedback loops</text><g transform="translate(150, 200)"><rect width="240" height="120" x="0" y="0" fill="#dc2626" stroke="none" rx="12"/><rect width="240" height="120" x="0" y="0" fill="url(#attackerGradient)" stroke="none" rx="12"/><text x="120" y="50" fill="#fff" font-family="system-ui" font-size="20" font-weight="600" text-anchor="middle">🎯 Attacker LLM</text><text x="120" y="75" fill="#fecaca" font-family="system-ui" font-size="14" text-anchor="middle">Generates refined prompts</text><text x="120" y="95" fill="#fecaca" font-family="system-ui" font-size="14" text-anchor="middle">based on feedback</text></g><g transform="translate(810, 200)"><rect width="240" height="120" x="0" y="0" fill="#3b82f6" stroke="none" rx="12"/><rect width="240" height="120" x="0" y="0" fill="url(#targetGradient)" stroke="none" rx="12"/><text x="120" y="50" fill="#fff" font-family="system-ui" font-size="20" font-weight="600" text-anchor="middle">🤖 Target System</text><text x="120" y="75" fill="#dbeafe" font-family="system-ui" font-size="14" text-anchor="middle">Responds to</text><text x="120" y="95" fill="#dbeafe" font-family="system-ui" font-size="14" text-anchor="middle">adversarial prompts</text></g><g transform="translate(480, 400)"><rect width="240" height="120" x="0" y="0" fill="#10b981" stroke="none" rx="12"/><rect width="240" height="120" x="0" y="0" fill="url(#judgeGradient)" stroke="none" rx="12"/><text x="120" y="50" fill="#fff" font-family="system-ui" font-size="20" font-weight="600" text-anchor="middle">⚖️ Judge LLM</text><text x="120" y="75" fill="#d1fae5" font-family="system-ui" font-size="14" text-anchor="middle">Scores responses</text><text x="120" y="95" fill="#d1fae5" font-family="system-ui" font-size="14" text-anchor="middle">(1-10 scale)</text></g><g><defs><marker id="arrowhead1" fill="#dc2626" markerHeight="12" markerWidth="12" orient="auto" refX="10" refY="6"><path d="M 0 0 L 12 6 L 0 12 z"/></marker></defs><path fill="none" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowhead1)" d="M 390 240 Q 600 180 800 240"/><text x="600" y="165" fill="#64748b" font-family="system-ui" font-size="14" text-anchor="middle">Adversarial</text><text x="600" y="185" fill="#64748b" font-family="system-ui" font-size="14" text-anchor="middle">Prompt</text></g><g><defs><marker id="arrowhead2" fill="#3b82f6" markerHeight="12" markerWidth="12" orient="auto" refX="10" refY="6"><path d="M 0 0 L 12 6 L 0 12 z"/></marker></defs><path fill="none" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowhead2)" d="M 870 320 Q 800 380 710 395"/><text x="850" y="370" fill="#64748b" font-family="system-ui" font-size="14" text-anchor="middle">Target</text><text x="850" y="390" fill="#64748b" font-family="system-ui" font-size="14" text-anchor="middle">Response</text></g><g><defs><marker id="arrowhead3" fill="#10b981" markerHeight="12" markerWidth="12" orient="auto" refX="10" refY="6"><path d="M 0 0 L 12 6 L 0 12 z"/></marker></defs><path fill="none" stroke="#10b981" stroke-width="3" marker-end="url(#arrowhead3)" d="M 490 395 Q 400 380 330 320"/><text x="350" y="370" fill="#10b981" font-family="system-ui" font-size="14" font-weight="500" text-anchor="middle">Score +</text><text x="350" y="390" fill="#10b981" font-family="system-ui" font-size="14" font-weight="500" text-anchor="middle">Feedback</text></g><defs><linearGradient id="attackerGradient" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" style="stop-color:#ef4444;stop-opacity:1"/><stop offset="100%" style="stop-color:#dc2626;stop-opacity:1"/></linea