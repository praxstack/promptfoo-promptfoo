<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="#f0f0f0"/><text x="400" y="40" font-size="24" font-weight="bold" text-anchor="middle">Adversarial Testing Approaches for LLMs</text><rect width="340" height="400" x="50" y="70" fill="#fff" stroke="#333" stroke-width="2" rx="10"/><text x="220" y="100" font-size="20" font-weight="bold" text-anchor="middle">White Box Testing</text><rect width="340" height="400" x="410" y="70" fill="#333" stroke="#333" stroke-width="2" rx="10"/><text x="580" y="100" fill="#fff" font-size="20" font-weight="bold" text-anchor="middle">Black Box Testing</text><text x="70" y="140" fill="#333" font-size="16">• Full access to model internals</text><text x="70" y="180" fill="#333" font-size="16">• Highly effective attacks</text><text x="70" y="220" fill="#333" font-size="16">• Slower and model-specific</text><text x="70" y="260" fill="#333" font-size="16">• Uncovers structural vulnerabilities</text><text x="70" y="300" fill="#333" font-size="16">• Technically complex</text><text x="70" y="340" fill="#333" font-size="16">• Useful for model developers</text><text x="70" y="380" fill="#333" font-size="16">• Can target specific model layers</text><text x="430" y="140" fill="#fff" font-size="16">• Only inputs/outputs observable</text><text x="430" y="180" fill="#fff" font-size="16">• Simulates real-world scenarios</text><text x="430" y="220" fill="#fff" font-size="16">• More practical for most teams</text><text x="430" y="260" fill="#fff" font-size="16">• Reveals unexpected behaviors</text><text x="430" y="300" fill="#fff" font-size="16">• Accessible to non-experts</text><text x="430" y="340" fill="#fff" font-size="16">• Useful for end-users/testers</text><text x="430" y="380" fill="#fff" font-size="16">• Tests overall system behavior</text><line x1="400" x2="400" y1="70" y2="470" stroke="#666" stroke-dasharray="5 5" stroke-width="2"/></svg>