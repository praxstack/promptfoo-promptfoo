<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750"><style>text{font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,Helvetica,Arial,sans-serif;font-size:14px}.phase-title,.title{font-weight:700}.title{font-size:20px}.phase-title{font-size:16px}.small-text{font-size:12px}</style><text x="500" y="40" fill="#1e293b" class="title" text-anchor="middle">GOAT Attack Implementation Flow</text><rect width="400" height="100" x="300" y="80" fill="#f8fafc" stroke="#64748b" stroke-width="2" rx="5"/><text x="500" y="105" fill="#334155" class="phase-title" text-anchor="middle">Input Analysis</text><text x="340" y="135" fill="#475569">• Analyze previous model response</text><text x="340" y="155" fill="#475569">• Evaluate response patterns</text><path stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)" d="M 500 180 L 500 260"/><rect width="900" height="320" x="50" y="260" fill="#f8fafc" stroke="#64748b" stroke-width="2" rx="5"/><text x="500" y="285" fill="#334155" class="phase-title" text-anchor="middle">Attack Strategy Selection</text><rect width="200" height="100" x="80" y="310" fill="#eff6ff" stroke="#2563eb" rx="4"/><text x="180" y="330" fill="#1d4ed8" font-weight="bold" text-anchor="middle">Direct Methods</text><text x="100" y="355" fill="#1e40af" class="small-text">• Refusal Suppression</text><text x="100" y="375" fill="#1e40af" class="small-text">• Context Manipulation</text><text x="100" y="395" fill="#1e40af" class="small-text">• Response Priming</text><rect width="200" height="100" x="300" y="310" fill="#eff6ff" stroke="#2563eb" rx="4"/><text x="400" y="330" fill="#1d4ed8" font-weight="bold" text-anchor="middle">Psychological Methods</text><text x="320" y="355" fill="#1e40af" class="small-text">• Emotional Triggering</text><text x="320" y="375" fill="#1e40af" class="small-text">• Authority Impersonation</text><rect width="200" height="100" x="520" y="310" fill="#eff6ff" stroke="#2563eb" rx="4"/><text x="620" y="330" fill="#1d4ed8"