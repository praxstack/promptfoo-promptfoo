<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700"><style>text{font-family:-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,Helvetica,Arial,sans-serif}</style><rect width="1000" height="700" fill="#fff"/><text x="500" y="40" fill="#2c3e50" font-size="20" font-weight="bold" text-anchor="middle">GOAT Attack Techniques and Reasoning Process</text><rect width="400" height="400" x="50" y="80" fill="#f8fafc" stroke="#2c3e50" stroke-width="2" rx="10"/><text x="250" y="110" fill="#2c3e50" font-weight="bold" text-anchor="middle">Attack Techniques</text><rect width="360" height="100" x="70" y="130" fill="#eff6ff" stroke="#2563eb" rx="5"/><text x="250" y="150" fill="#2563eb" font-size="14" font-weight="bold" text-anchor="middle">Output Manipulation</text><text x="90" y="170" fill="#1e40af" font-size="12">• Refusal Suppression: Prevent common refusal phrases</text><text x="90" y="190" fill="#1e40af" font-size="12">• Response Priming: Force specific output patterns</text><text x="90" y="210" fill="#1e40af" font-size="12">• Topic Splitting: Mix safe and unsafe requests</text><rect width="360" height="100" x="70" y="240" fill="#eff6ff" stroke="#2563eb" rx="5"/><text x="250" y="260" fill="#2563eb" font-size="14" font-weight="bold" text-anchor="middle">Safe Response Distractors</text><text x="90" y="280" fill="#1e40af" font-size="12">• Dual Response: Request safe and unsafe outputs</text><text x="90" y="300" fill="#1e40af" font-size="12">• Opposite Intent: Flip response sentiment</text><text x="90" y="320" fill="#1e40af" font-size="12">• Topic Splitting: Embed harmful content in safe tasks</text><rect width="360" height="100" x="70" y="350" fill="#eff6ff" stroke="#2563eb" rx="5"/><text x="250" y="370" fill="#2563eb" font-size="14" font-weight="bold" text-anchor="middle">Fictional Scenarios</text><text x="90" y="390" fill="#1e40af" font-size="12">• Hypotheticals: Create fictional contexts</text><text x="90" y="410" fill="#1e40af" font-size="12">• Persona Modification: Role-play as different entities</text><text x="90" y="430" fill="#1e40af" font-size="12">• Character/Historical Figure Impersonation</text><rect width="400" height="400" x="550" y="80" fill="#f8fafc" stroke="#2c3e50" stroke-width="2" rx="10"/><text x="750" y="110" fill="#2c3e50" font-weight="bold" text-anchor="middle">Reasoning Process Per Turn</text><rect width="360" height="100" x="570" y="130" fill="#faf5ff" stroke="#7c3aed" rx="5"/><text x="750" y="150" fill="#7c3aed" font-size="14" font-weight="bold" text-anchor="middle">1. Observation</text><text x="590" y="170" fill="#5b21b6" font-size="12">• Analyze target model&apos;s previous response</text><text x="590" y="190" fill="#5b21b6" font-size="12">• Identify safety mechanisms triggered</text><text x="590" y="210" fill="#5b21b6" font-size="12">• Assess progress toward goal</text><rect width="360" height="100" x="570" y="240" fill="#faf5ff" stroke="#7c3aed" rx="5"/><text x="750" y="260" fill="#7c3aed" font-size="14" font-weight="bold" text-anchor="middle">2. Thought</text><text x="590" y="280" fill="#5b21b6" font-size="12">• Reflect on conversation direction</text><text x="590" y="300" fill="#5b21b6" font-size="12">• Consider alternative attack approaches</text><text x="590" y="320" fill="#5b21b6" font-size="12">• Plan next steps toward goal</text><rect width="360" height="100" x="570" y="350" fill="#faf5ff" stroke="#7c3aed" rx="5"/><text x="750" y="370" fill="#7c3aed" font-size="14" font-weight="bold" text-anchor="middle">3. Strategy</text><text x="590" y="390" fill="#5b21b6" font-size="12">• Select appropriate attack technique(s)</text><text x="590" y="410" fill="#5b21b6" font-size="12">• Formulate specific implementation</text><text x="590" y="430" fill="#5b21b6" font-size="12">• Generate adversarial prompt</text><rect width="900" height="180" x="50" y="500" fill="#f8fafc" stroke="#2c3e50" stroke-width="2" rx="10"/><text x="500" y="530" fill="#2c3e50" font-weight="bold" text-anchor="middle">Example Conversation Turn Flow</text><path stroke="#2c3e50" stroke-width="1" d="M 100 580 L 900 580"/><circle cx="200" cy="580" r="5" fill="#2c3e50"/><circle cx="400" cy="580" r="5" fill="#2c3e50"/><circle cx="600" cy="580" r="5" fill="#2c3e50"/><circle cx="800" cy="580" r="5" fill="#2c3e50"/><text x="200" y="600" fill="#2c3e50" font-size="12" text-anchor="middle">Observe Response</text><text x="400" y="600" fill="#2c3e50" font-size="12" text-anchor="middle">Form Thought</text><text x="600" y="600" fill="#2c3e50" font-size="12" text-anchor="middle">Select Strategy</text><text x="800" y="600" fill="#2c3e50" font-size="12" text-anchor="middle">Generate Prompt</text><text x="200" y="630" fill="#2c3e50" font-size="10" text-anchor="middle">&quot;Model showed resistance</text><text x="200" y="645" fill="#2c3e50" font-size="10" text-anchor="middle">to direct request&quot;</text><text x="400" y="630" fill="#2c3e50" font-size="10" text-anchor="middle">&quot;Need to create more</text><text x="400" y="645" fill="#2c3e50" font-size="10" text-anchor="middle">indirect approach&quot;</text><text x="600" y="630" fill="#2c3e50" font-size="10" text-anchor="middle">&quot;Apply Hypothetical +</text><text x="600" y="645" fill="#2c3e50" font-size="10" text-anchor="middle">Persona Modification&quot;</text><text x="800" y="630" fill="#2c3e50" font-size="10" text-anchor="middle">&quot;Role-play scenario</text><text x="800" y="645" fill="#2c3e50" font-size="10" text-anchor="middle">with fictional context&quot;</text></svg>