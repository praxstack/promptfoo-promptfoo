<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400"><defs><style>.label,.title{font-family:-apple-system,system-ui,sans-serif}.title{font-size:14px;font-weight:700}.label{font-size:12px}.code{font-family:monospace;font-size:11px}.arrow,.box{stroke:#666;stroke-width:2}.arrow{fill:none;marker-end:url(#arrowhead)}.box{fill:#fff}.highlight{fill:#e3f2fd}.pass{fill:#4caf50}.fail{fill:#f44336}</style><marker id="arrowhead" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><polygon fill="#666" points="0 0 10 3.5 0 7"/></marker></defs><rect width="100%" height="100%" fill="#fff"/><g transform="translate(50,50)"><rect width="200" height="180" class="box highlight" rx="5"/><text x="10" y="30" class="title">CyberSecEval Dataset</text><text x="10" y="60" class="code">{</text><text x="20" y="85" class="code">&quot;test_case_prompt&quot;: &quot;...&quot;,</text><text x="20" y="110" class="code">&quot;user_input&quot;: &quot;...&quot;,</text><text x="20" y="135" class="code">&quot;judge_question&quot;: &quot;...&quot;,</text><text x="20" y="160" class="code">&quot;speaking_language&quot;: &quot;...&quot;</text><text x="10" y="175" class="code">}</text></g><g transform="translate(300,30)"><rect width="200" height="200" class="box" rx="5"/><text x="10" y="30" class="title">Plugin Processing</text><text x="10" y="70" class="label">1. Download test cases</text><text x="10" y="100" class="label">2. Format as messages</text><text x="10" y="130" class="label">3. Random selection</text><text x="10" y="160" class="label">4. Test model</text><text x="10" y="190" class="label">5. Evaluate response</text></g><g transform="translate(550,50)"><rect width="200" height="200" class="box highlight" rx="5"/><text x="10" y="30" class="title">LLM Testing</text><text x="10" y="60" class="code">[{</text><text x="20" y="85" class="code">&quot;role&quot;: &quot;system&quot;,</text><text x="20" y="110" class="code">&quot;content&quot;: &quot;...&quot;</text><text x="10" y="135" class="code">}, {</text><text x="20" y="160" class="code">&quot;role&quot;: &quot;user&quot;,</text><text x="20" y="185" class="code">&quot;content&quot;: &quot;...&quot;</text><text x="10" y="195" class="code">}]</text></g><g transform="translate(300,280)"><rect width="200" height="100" class="box" rx="5"/><text x="10" y="30" class="title">Evaluation Results</text><text x="10" y="60" class="pass">✓</text><text x="25" y="60" class="label">PASS: Secure response</text><text x="10" y="85" class="fail">✗</text><text x="25" y="85" class="label">FAIL: Vulnerable response</text></g><path d="M250,140 H290" class="arrow"/><path d="M500,140 H540" class="arrow"/><path d="M400,230 V270" class="arrow"/></svg>