<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500"><defs><linearGradient id="blackBoxGradient" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" style="stop-color:#2563eb;stop-opacity:1"/><stop offset="100%" style="stop-color:#1e40af;stop-opacity:1"/></linearGradient><linearGradient id="componentGradient" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1"/><stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1"/></linearGradient><linearGradient id="traceGradient" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" style="stop-color:#dc2626;stop-opacity:1"/><stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1"/></linearGradient><filter id="dropShadow" width="200%" height="200%" x="-50%" y="-50%"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dx="0" dy="2" result="offsetblur"/><feComponentTransfer><feFuncA slope=".2" type="linear"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter><g id="userIcon"><circle cx="12" cy="8" r="4" fill="#fff"/><path fill="#fff" d="M12 14c-5 0-9 2-9 6v2h18v-2c0-4-4-6-9-6z"/></g><g id="codeIcon"><path fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 4l-4 4 4 4M16 4l4 4-4 4M14 2l-4 16"/></g><g id="traceIcon"><path fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2 12h4l2-4 4 8 2-4h4"/></g></defs><text x="400" y="40" fill="#1f2937" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" text-anchor="middle">Layered Testing for LLM Agents</text><g transform="translate(50, 80)"><rect width="700" height="100" x="0" y="0" fill="url(#blackBoxGradient)" filter="url(#dropShadow)" rx="12"/><g transform="translate(20, 35) scale(1.5)"><use href="#userIcon"/></g><text x="70" y="35" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600">Black-Box Testing (End-to-End)</text><text x="70" y="60" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="14" opacity=".9">Test the complete agent system as users would interact with it</text><text x="70" y="80" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-style="italic" opacity=".7">Like a test drive: Does it get you from A to B safely?</text><text x="500" y="50" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="11" opacity=".9">Best for:</text><text x="500" y="68" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="11" opacity=".8">• Quick tests</text><text x="500" y="84" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="11" opacity=".8">• Compliance testing</text></g><g transform="translate(50, 210)"><rect width="700" height="100" x="0" y="0" fill="url(#componentGradient)" filter="url(#dropShadow)" rx="12"/><g transform="translate(20, 35) scale(1.5)"><use href="#codeIcon"/></g><text x="70" y="35" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600">Component Testing (Direct Hooks)</text><text x="70" y="60" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="14" opacity=".9">Test individual agent components in isolation</text><text x="70" y="80" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-style="italic" opacity=".7">Like checking engine, brakes, and steering individually</text><text x="500" y="50" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="11" opacity=".9">Best for:</text><text x="500" y="68" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="11" opacity=".8">• Finding specific vulnerabilities</text><text x="500" y="84" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="11" opacity=".8">• Faster iteration</text></g><g transform="translate(50, 340)"><rect width="700" height="100" x="0" y="0" fill="url(#traceGradient)" filter="url(#dropShadow)" rx="12"/><g transform="translate(20, 35) scale(1.5)"><use href="#traceIcon"/></g><text x="70" y="35" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600">Trace-Based Testing (Glass Box)</text><text x="70" y="60" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="14" opacity=".9">Use OpenTelemetry tracing to observe internal agent behavior</text><text x="70" y="80" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-style="italic" opacity=".7">Like hooking up a diagnostic computer during the drive</text><text x="500" y="50" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="11" opacity=".9">Best for:</text><text x="500" y="68" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="11" opacity=".8">• Debugging vulnerabilities</text><text x="500" y="84" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="11" opacity=".8">• Complex failure debugging</text></g><g opacity=".4"><path fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)" d="M 400 180 L 400 210"/><path fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)" d="M 400 310 L 400 340"/></g><defs><marker id="arrowhead" markerHeight="10" markerWidth="10" orient="auto" refX="5" refY="5"><polygon fill="#6b7280" points="0 0 10 5 0 10"/></marker></defs><text x="400" y="475" fill="#6b7280" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle">Multi-layered approach ensures comprehensive agent security testing</text></svg>